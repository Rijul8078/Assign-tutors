<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Login | Assign Tutors</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/styles.css"></head>
<body class="portal-bg">
<main class="auth-shell">
  <section class="auth-card reveal show">
    <a class="brand" href="/"><img src="/assets/assign_tutors_logo_transparent.png" alt="logo"><span class="sr-only">Assign Tutors</span></a>
    <h1>Admin Workspace Login</h1>
    <p>Secure admin access for student approval, order management, and progress updates.</p>
    <label>Username<input id="username" placeholder="admin"></label>
    <label>Password<input id="password" type="password" placeholder="Enter password"></label>
    <button id="login-btn" class="btn btn-primary" type="button">Sign In</button>
    <p id="status" class="status"></p>
  </section>
</main>
<script src="/js/admin-login.js"></script>
</body></html>
